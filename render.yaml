services:
  - type: web
    name: diraschool
    runtime: node
    buildCommand: cd apps/web && npm install && npm run build
    startCommand: cd apps/web && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://diraschool-api.onrender.com
    port: 5173

  - type: web
    name: diraschool-api
    runtime: node
    buildCommand: cd apps/api && npm install
    startCommand: cd apps/api && npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      # Add your other environment variables here
      # - key: MONGODB_URI
      #   value: your-mongodb-uri
      # - key: REDIS_URL
      #   value: your-redis-url
    port: 5000
