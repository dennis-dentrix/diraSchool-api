services:
  # API Service - Express.js backend
  - type: web
    name: diraschool-api
    runtime: node
    repo: https://github.com/dennis-dentrix/diraschool-api
    branch: main
    buildCommand: npm install
    startCommand: npm start -w apps/api
    envVars:
      - key: NODE_ENV
        value: production
      # Required: Add your own values
      - key: MONGODB_URI
        value: your-mongodb-uri-here
      - key: REDIS_URL
        value: your-redis-url-here
      - key: JWT_SECRET
        value: your-jwt-secret-here

  # Web Service - Next.js frontend
  - type: web
    name: diraschool
    runtime: node
    repo: https://github.com/dennis-dentrix/diraschool-api
    branch: main
    buildCommand: npm install && npm run build:web
    startCommand: npm start -w apps/web
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://diraschool-api.onrender.com
