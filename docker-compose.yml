services:
  mongodb:
    image: mongo:7
    container_name: edusaas-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: edusaas-redis
    ports:
      - '6379:6379'
    restart: unless-stopped

  mongo-express:
    image: mongo-express
    container_name: edusaas-mongo-ui
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017
      ME_CONFIG_BASICAUTH: 'false'
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongo_data:
